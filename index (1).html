<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBeats — Tu biblioteca con banda sonora</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f9f4ef;
  --surface:#fffdf9;
  --ink:#2a1f1f;
  --ink2:#7a6060;
  --border:rgba(42,31,31,0.1);
  --rose:#e8889a;
  --rose-dark:#c05070;
  --rose-light:#fdeef2;
  --rose-mid:#f0a8b5;
  --violet:#9b8fd4;
  --violet-light:#f0edfb;
  --violet-mid:#c4b8ed;
  --mint:#6ac5a0;
  --mint-light:#edf7f2;
  --amber:#e8a44a;
  --amber-light:#fef5e4;
  --sp:#1db954;
  --sp-hover:#1aa34a;
  --red:#d96060;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

.app{display:flex;flex-direction:column;min-height:100vh}

.header{
  background:linear-gradient(135deg,#f7c5d0 0%,#ddd0f5 55%,#b5d4f4 100%);
  padding:2.2rem 2.5rem 1.8rem;
  position:relative;overflow:hidden;
}
.header-blob1{position:absolute;right:-80px;top:-80px;width:280px;height:280px;background:rgba(255,255,255,0.28);border-radius:50%;pointer-events:none}
.header-blob2{position:absolute;right:60px;top:20px;width:110px;height:110px;background:rgba(255,255,255,0.18);border-radius:50%;pointer-events:none}
.logo{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:600;letter-spacing:-0.03em;color:var(--ink);position:relative;z-index:1;line-height:1}
.logo em{color:var(--rose-dark);font-style:normal}
.tagline{font-size:0.7rem;color:rgba(42,31,31,0.5);letter-spacing:0.18em;text-transform:uppercase;margin-top:0.3rem;position:relative;z-index:1}

.main{flex:1;padding:2rem 2rem 5rem;max-width:1000px;margin:0 auto;width:100%}

.add-section{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:1.6rem 1.8rem;margin-bottom:2.2rem;box-shadow:0 2px 20px rgba(42,31,31,0.05)}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;margin-bottom:1rem;color:var(--ink)}
.add-row{display:flex;gap:8px}
.book-input{flex:1;padding:0.78rem 1.1rem;border:1.5px solid var(--border);border-radius:12px;font-family:'Outfit',sans-serif;font-size:0.9rem;background:var(--bg);color:var(--ink);outline:none;transition:border-color 0.2s}
.book-input:focus{border-color:var(--rose-mid)}
.book-input::placeholder{color:var(--ink2);opacity:0.6}
.add-btn{padding:0.78rem 1.5rem;background:var(--rose-dark);color:#fff;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:background 0.2s,transform 0.1s}
.add-btn:hover{background:#a83d5c}
.add-btn:active{transform:scale(0.97)}
.add-btn:disabled{background:#ccc;cursor:not-allowed}

.lib-header{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:1.4rem;display:flex;align-items:center;gap:0.7rem;color:var(--ink)}
.lib-count{background:var(--violet-light);color:var(--violet);font-family:'Outfit',sans-serif;font-size:0.7rem;font-weight:500;padding:3px 12px;border-radius:20px}

.empty{text-align:center;padding:5rem 2rem;color:var(--ink2)}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.35}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic}
.empty-sub{font-size:0.8rem;margin-top:0.4rem;opacity:0.65}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.6rem}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;overflow:visible;position:relative;box-shadow:0 2px 18px rgba(42,31,31,0.06);transition:box-shadow 0.2s}
.card:hover{box-shadow:0 6px 30px rgba(42,31,31,0.1)}

.card-top{display:flex;border-radius:20px 20px 0 0;overflow:hidden}
.book-cover{width:90px;min-width:90px;aspect-ratio:2/3;object-fit:cover;display:block}
.cover-ph{width:90px;min-width:90px;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--amber-light),var(--rose-light));font-size:2rem;opacity:0.55}
.card-info{flex:1;padding:1.1rem 1rem;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.book-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--ink)}
.book-author{font-size:0.72rem;color:var(--ink2);margin-top:0.25rem}
.track-pill{font-size:0.7rem;border-radius:20px;padding:3px 10px;display:inline-block;margin-top:0.7rem;width:fit-content}
.track-pill.has{background:var(--mint-light);color:var(--mint)}
.track-pill.none{background:var(--amber-light);color:var(--amber)}

.del-card{position:absolute;top:9px;right:9px;width:26px;height:26px;background:rgba(42,31,31,0.4);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.18s;z-index:3}
.card:hover .del-card{opacity:1}
.del-card:hover{background:rgba(42,31,31,0.7)}

.plist-bar{padding:0.65rem 1rem;background:var(--violet-light);border-top:1.5px solid var(--border);display:flex;align-items:center;gap:8px}
.plist-icon{font-size:14px;opacity:0.6}
.plist-input{flex:1;background:transparent;border:none;outline:none;font-family:'Cormorant Garamond',serif;font-size:0.92rem;font-style:italic;color:var(--ink)}
.plist-input::placeholder{color:var(--violet);opacity:0.7}
.plist-label{font-size:0.68rem;color:var(--violet);font-weight:500;white-space:nowrap}

.tracklist{list-style:none;border-top:1.5px solid var(--border)}
.track-row{display:flex;align-items:center;gap:8px;padding:0.5rem 1rem;border-bottom:1px solid var(--border);transition:background 0.13s}
.track-row:last-child{border-bottom:none}
.track-row:hover{background:var(--bg)}
.track-n{font-size:0.66rem;color:var(--ink2);min-width:16px;text-align:right}
.track-info{flex:1;min-width:0}
.track-name{font-size:0.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:0.7rem;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-link{display:flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--sp);border-radius:50%;text-decoration:none;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.track-row:hover .sp-link{opacity:1}
.del-track{background:none;border:none;cursor:pointer;color:var(--ink2);font-size:14px;opacity:0;transition:opacity 0.15s;padding:2px 4px;border-radius:4px;flex-shrink:0}
.track-row:hover .del-track{opacity:1}
.del-track:hover{color:var(--red)}

.search-area{padding:0.75rem 1rem;background:var(--bg);border-top:1px solid var(--border);position:relative;z-index:10}
.search-row{display:flex;gap:6px}
.search-input{flex:1;padding:0.5rem 0.85rem;border:1.5px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;font-size:0.8rem;background:var(--surface);color:var(--ink);outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--mint)}
.search-input::placeholder{font-size:0.75rem;color:var(--ink2);opacity:0.55}
.search-btn{padding:0.5rem 1rem;background:var(--sp);color:#fff;border:none;border-radius:10px;font-size:0.78rem;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:background 0.15s;display:flex;align-items:center;gap:5px}
.search-btn:hover{background:var(--sp-hover)}

.dropdown{position:absolute;left:0;right:0;top:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:0 0 16px 16px;z-index:999;box-shadow:0 12px 35px rgba(42,31,31,0.12);overflow:hidden;display:none}
.r-item{display:flex;align-items:center;gap:10px;padding:0.65rem 1rem;cursor:pointer;transition:background 0.13s;border-bottom:1px solid var(--border)}
.r-item:last-child{border-bottom:none}
.r-item:hover{background:var(--mint-light)}
.r-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0}
.r-thumb-ph{width:40px;height:40px;border-radius:8px;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:var(--rose-dark)}
.r-info{flex:1;min-width:0}
.r-name{font-size:0.83rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-artist{font-size:0.7rem;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-add{font-size:0.7rem;color:var(--mint);font-weight:500;white-space:nowrap;padding:3px 8px;background:var(--mint-light);border-radius:20px}
.r-msg{padding:1rem;text-align:center;font-size:0.8rem;color:var(--ink2)}

.share-bar{padding:0.7rem 1rem;border-top:1.5px solid var(--border);display:flex;gap:6px;border-radius:0 0 20px 20px;background:var(--surface)}
.copy-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:0.5rem;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-size:0.74rem;color:var(--ink2);cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s}
.copy-btn:hover{background:var(--violet-light);color:var(--violet);border-color:var(--violet-mid)}
.sp-open{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:0.5rem;background:var(--sp);border:none;border-radius:10px;font-size:0.74rem;color:#fff;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:500;text-decoration:none;transition:background 0.15s}
.sp-open:hover{background:var(--sp-hover)}

.loading-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;height:130px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff5f0;padding:0.65rem 1.5rem;border-radius:30px;font-size:0.82rem;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:520px){
  .main{padding:1rem 1rem 3rem}
  .grid{grid-template-columns:1fr}
  .add-row{flex-direction:column}
  .header{padding:1.5rem 1.5rem 1.3rem}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-blob1"></div>
    <div class="header-blob2"></div>
    <div class="logo">Book<em>Beats</em></div>
    <div class="tagline">Tu biblioteca con banda sonora</div>
  </div>

  <div class="main">
    <div class="add-section">
      <div class="section-title">Agregar libro</div>
      <div class="add-row">
        <input class="book-input" id="bookInput" type="text" placeholder="Título del libro…" />
        <button class="add-btn" id="addBtn" onclick="addBook()">+ Agregar</button>
      </div>
    </div>

    <div class="lib-header">
      Mi biblioteca <span class="lib-count" id="libCount">0 libros</span>
    </div>
    <div id="grid" class="grid"></div>
    <div id="emptyState" class="empty">
      <div class="empty-icon">📚</div>
      <div class="empty-title">Tu biblioteca está vacía</div>
      <div class="empty-sub">Agrega un libro, ponle nombre a su playlist y busca canciones</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='bookbeats_v7';
let lib=[];
let timers={};

function load(){
  try{const s=localStorage.getItem(KEY);if(s)lib=JSON.parse(s);}catch(e){}
  render();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(lib));}catch(e){}}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function fetchBook(title){
  try{
    const r=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(title)}&limit=1&fields=title,author_name,cover_i`);
    const d=await r.json();
    if(d.docs?.[0]){const b=d.docs[0];return{title:b.title||title,author:b.author_name?.[0]||'Autor desconocido',coverId:b.cover_i||null};}
  }catch(e){}
  return{title,author:'Autor desconocido',coverId:null};
}

async function searchTracks(q){
  try{
    const r=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=6&entity=song`);
    const d=await r.json();
    return(d.results||[]).map(t=>({
      name:t.trackName,artist:t.artistName,thumb:t.artworkUrl60,
      spotifyUrl:`https://open.spotify.com/search/${encodeURIComponent(t.trackName+' '+t.artistName)}`
    }));
  }catch(e){return[];}
}

function closeDropdowns(){document.querySelectorAll('.dropdown').forEach(d=>{d.style.display='none';d._res=null;});}

function showDropdown(id,results,loading){
  closeDropdowns();
  const dd=document.getElementById(`dd-${id}`);if(!dd)return;
  if(loading){dd.innerHTML=`<div class="r-msg">Buscando canciones…</div>`;}
  else if(!results?.length){dd.innerHTML=`<div class="r-msg">Sin resultados. Prueba otro término.</div>`;}
  else{
    dd.innerHTML=results.map((t,i)=>`
      <div class="r-item" onclick="pickTrack('${id}',${i})">
        ${t.thumb?`<img class="r-thumb" src="${t.thumb}" alt="">`:`<div class="r-thumb-ph">♪</div>`}
        <div class="r-info"><div class="r-name">${esc(t.name)}</div><div class="r-artist">${esc(t.artist)}</div></div>
        <span class="r-add">+ Agregar</span>
      </div>`).join('');
    dd._res=results;
  }
  dd.style.display='block';
}

function pickTrack(id,idx){
  const dd=document.getElementById(`dd-${id}`);if(!dd?._res)return;
  const t=dd._res[idx];
  const book=lib.find(b=>b.id===id);if(!book||!t)return;
  book.tracks.push({id:Date.now().toString(),name:t.name,artist:t.artist,spotifyUrl:t.spotifyUrl,thumb:t.thumb});
  save();closeDropdowns();
  const inp=document.getElementById(`si-${id}`);if(inp)inp.value='';
  render();
  setTimeout(()=>document.getElementById(`si-${id}`)?.focus(),30);
  toast(`"${t.name}" agregada`);
}

function onInput(id){
  const inp=document.getElementById(`si-${id}`);
  const q=inp?.value.trim()||'';
  if(timers[id])clearTimeout(timers[id]);
  if(!q){closeDropdowns();return;}
  showDropdown(id,null,true);
  timers[id]=setTimeout(async()=>{
    const r=await searchTracks(q);
    if(document.getElementById(`si-${id}`)?.value.trim()===q)showDropdown(id,r,false);
  },420);
}

function triggerSearch(id){
  const q=document.getElementById(`si-${id}`)?.value.trim()||'';
  if(!q){toast('Escribe el nombre de una canción');return;}
  if(timers[id])clearTimeout(timers[id]);
  showDropdown(id,null,true);
  searchTracks(q).then(r=>showDropdown(id,r,false));
}

function onKeydown(e,id){if(e.key==='Escape')closeDropdowns();}

function onPlaylistName(id){
  const v=document.getElementById(`pn-${id}`)?.value;
  const book=lib.find(b=>b.id===id);if(book)book.playlistName=v;
  save();
}

function deleteTrack(bookId,trackId){
  const b=lib.find(b=>b.id===bookId);if(!b)return;
  b.tracks=b.tracks.filter(t=>t.id!==trackId);save();render();
}

function deleteBook(id){
  lib=lib.filter(b=>b.id!==id);save();render();toast('Libro eliminado');
}

function copyPlaylist(id){
  const b=lib.find(b=>b.id===id);if(!b)return;
  const name=b.playlistName||b.title;
  const text=`🎵 ${name}\n\n`+b.tracks.map((t,i)=>`${i+1}. ${t.name} — ${t.artist}\n   ${t.spotifyUrl}`).join('\n\n');
  navigator.clipboard?.writeText(text).then(()=>toast('Playlist copiada con enlaces de Spotify'));
}

async function addBook(){
  const inp=document.getElementById('bookInput');
  const title=inp.value.trim();
  if(!title){toast('Ingresa el nombre de un libro');return;}
  const btn=document.getElementById('addBtn');
  btn.disabled=true;btn.textContent='Buscando…';
  const grid=document.getElementById('grid');
  document.getElementById('emptyState').style.display='none';
  const lc=document.createElement('div');lc.className='loading-card';
  grid.insertBefore(lc,grid.firstChild);
  try{
    const bd=await fetchBook(title);
    lib.unshift({id:Date.now().toString(),title:bd.title,author:bd.author,coverId:bd.coverId,playlistName:'',tracks:[]});
    save();lc.remove();render();
    toast(`"${bd.title}" agregado`);inp.value='';
    setTimeout(()=>document.getElementById(`pn-${lib[0].id}`)?.focus(),60);
  }catch(e){lc.remove();toast('Error al buscar el libro');if(!lib.length)document.getElementById('emptyState').style.display='block';}
  btn.disabled=false;btn.textContent='+ Agregar';
}

function render(){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('emptyState');
  document.getElementById('libCount').textContent=`${lib.length} ${lib.length===1?'libro':'libros'}`;
  if(!lib.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  grid.innerHTML=lib.map(book=>{
    const cUrl=book.coverId?`https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg`:null;
    const coverHtml=cUrl?`<img class="book-cover" src="${cUrl}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';
    const ph=`<div class="cover-ph" style="${cUrl?'display:none':''}">📖</div>`;
    const hasTracks=book.tracks.length>0;

    const tracksHtml=hasTracks?`<ul class="tracklist">${book.tracks.map((t,i)=>`
      <li class="track-row">
        <span class="track-n">${i+1}</span>
        <div class="track-info">
          <div class="track-name">${esc(t.name)}</div>
          <div class="track-artist">${esc(t.artist)}</div>
        </div>
        <a class="sp-link" href="${t.spotifyUrl}" target="_blank" rel="noopener" title="Buscar en Spotify">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        </a>
        <button class="del-track" onclick="deleteTrack('${book.id}','${t.id}')" title="Eliminar">×</button>
      </li>`).join('')}</ul>`:'';

    return `<div class="card">
      <button class="del-card" onclick="deleteBook('${book.id}')">×</button>
      <div class="card-top">
        ${coverHtml}${ph}
        <div class="card-info">
          <div>
            <div class="book-title">${esc(book.title)}</div>
            <div class="book-author">${esc(book.author)}</div>
          </div>
          <span class="track-pill ${hasTracks?'has':'none'}">${hasTracks?`${book.tracks.length} ${book.tracks.length===1?'canción':'canciones'}`:'Sin canciones aún'}</span>
        </div>
      </div>
      <div class="plist-bar">
        <span class="plist-icon">♪</span>
        <input class="plist-input" id="pn-${book.id}" type="text"
          placeholder="Nombre de tu playlist…"
          value="${esc(book.playlistName||'')}"
          oninput="onPlaylistName('${book.id}')" />
        <span class="plist-label">playlist</span>
      </div>
      ${tracksHtml}
      <div class="search-area">
        <div class="search-row">
          <input class="search-input" id="si-${book.id}" type="text"
            placeholder="Buscar canción…"
            oninput="onInput('${book.id}')"
            onkeydown="onKeydown(event,'${book.id}')" />
          <button class="search-btn" onclick="triggerSearch('${book.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            Buscar
          </button>
        </div>
        <div class="dropdown" id="dd-${book.id}"></div>
      </div>
      ${hasTracks?`<div class="share-bar">
        <button class="copy-btn" onclick="copyPlaylist('${book.id}')">↗ Copiar con enlaces</button>
        <a class="sp-open" href="https://open.spotify.com/search/${encodeURIComponent(book.playlistName||book.title)}" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Buscar en Spotify
        </a>
      </div>`:''}
    </div>`;
  }).join('');
}

document.addEventListener('click',e=>{if(!e.target.closest('.search-area'))closeDropdowns();});
document.getElementById('bookInput').addEventListener('keydown',e=>{if(e.key==='Enter')addBook();});
load();
</script>
